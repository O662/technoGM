name: technogm
description: TechnoGM — Bold Workout Tracker & Generator
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # UI & Fonts
  google_fonts: ^6.2.1

  # Charts
  fl_chart: ^0.68.0

  # Storage & Files
  path_provider: ^2.1.3
  shared_preferences: ^2.3.0
  file_picker: ^8.0.3
  share_plus: ^9.0.0

  # State management
  provider: ^6.1.2

  # Health & fitness tracking
  health: ^12.0.0

  # Home screen widgets
  home_widget: ^0.9.1

  # Utilities
  uuid: ^4.3.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/NewAppLogo.png"
  adaptive_icon_background: "#050510"
  adaptive_icon_foreground: "assets/icon/NewAppLogo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
